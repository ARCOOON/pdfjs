name: Build and Release PDF.js Standard JS

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours.
  workflow_dispatch:
    inputs:
      version:
        description: 'NPM pdfjs-dist version (4.3.136 or latest)'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: write # Required to create GitHub Releases

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wrapper repository
        uses: actions/checkout@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install build dependencies
        run: npm install

      - name: Determine target version
        id: version_check
        run: |
          INPUT_VERSION="${{ inputs.version || 'latest' }}"
          
          if [ "$INPUT_VERSION" == "latest" ]; then
            NPM_VERSION=$(npm view pdfjs-dist version)
            echo "Target version is latest npm: $NPM_VERSION"
          else
            NPM_VERSION=$(echo "$INPUT_VERSION" | sed 's/^v//')
            echo "Target version specified: $NPM_VERSION"
          fi
          
          echo "version=$NPM_VERSION" >> $GITHUB_OUTPUT
          
          if [ "${{ github.event_name }}" == "schedule" ]; then
            RELEASE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" https://api.github.com/repos/${{ github.repository }}/releases/tags/custom-js-$NPM_VERSION)
            if [ "$RELEASE_EXISTS" == "200" ]; then
              echo "Release custom-js-$NPM_VERSION already exists. Skipping automated build."
              echo "should_build=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "should_build=true" >> $GITHUB_OUTPUT

      - name: Install target pdfjs-dist version
        if: steps.version_check.outputs.should_build == 'true'
        run: npm install pdfjs-dist@${{ steps.version_check.outputs.version }}

      - name: Run transpile script
        if: steps.version_check.outputs.should_build == 'true'
        run: npm run build

      - name: Package release assets
        if: steps.version_check.outputs.should_build == 'true'
        run: |
          # Copy the original Apache 2.0 license
          cp node_modules/pdfjs-dist/LICENSE dist/
          
          # Create target directories to replicate upstream structure
          mkdir -p dist/wasm dist/build
          
          # Find and copy all .wasm files to both build/ and wasm/ just to ensure compatibility with various module loaders
          find node_modules/pdfjs-dist/ -type f -name "*.wasm" -exec cp {} dist/build/ \; 2>/dev/null || true
          find node_modules/pdfjs-dist/ -type f -name "*.wasm" -exec cp {} dist/wasm/ \; 2>/dev/null || true
          
          # Copy image_decoders directory entirely
          cp -r node_modules/pdfjs-dist/image_decoders dist/ 2>/dev/null || true
          
          # Clean up wasm folder if no wasm files were found (for older pdf.js versions)
          rmdir dist/wasm 2>/dev/null || true
          
          cd dist
          zip -r "../pdfjs-${{ steps.version_check.outputs.version }}-custom-release.zip" ./*

      - name: Create GitHub Release
        if: steps.version_check.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "custom-js-${{ steps.version_check.outputs.version }}"
          name: "PDF.js JS Build v${{ steps.version_check.outputs.version }}"
          files: "pdfjs-${{ steps.version_check.outputs.version }}-custom-release.zip"
          body: |
            Automated deployment of compiled PDF.js standard JavaScript files.
            - **Upstream Version:** https://www.npmjs.com/package/pdfjs-dist/v/${{ steps.version_check.outputs.version }}
            - **Format:** IIFE (Standard script tag compatible)
            - **Files:** Includes standard `.js` and minified `.min.js` variants under `build/`
            - **WebAssembly/Decoders:** Included (`.wasm` and `image_decoders/`)
            - **Polyfills:** Included (Legacy build base)
            - **Source Maps:** Included (`.js.map` and `.min.js.map`)
            - **License:** Apache License 2.0 (Included in archive)
